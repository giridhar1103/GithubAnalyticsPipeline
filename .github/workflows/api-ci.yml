name: api-ci

on:
  pull_request:
    paths:
      - "api/**"
      - "tests/**"
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "tests/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: pytest tests
