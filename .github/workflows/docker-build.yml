name: docker-build

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - ".github/workflows/docker-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<aws_account_id>:role/<github_actions_role_here>
          aws-region: us-east-1
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          IMAGE="<aws_account_id>.dkr.ecr.us-east-1.amazonaws.com/github-analytics-api:latest"
          docker build -t "$IMAGE" ./api
          docker push "$IMAGE"
